<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!--
    TEMPLATE: Cover image for published documents
    CUSTOMIZE: Replace title, subtitle, author, metrics, and branding
    Convert to PNG: magick cover.svg -resize 800x600 cover.png
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Decorative lines -->
  <g opacity="0.12" stroke="#0ea5e9" stroke-width="1" fill="none">
    <line x1="50" y1="120" x2="750" y2="120"/>
    <line x1="50" y1="200" x2="750" y2="200"/>
    <line x1="50" y1="280" x2="750" y2="280"/>
    <line x1="50" y1="360" x2="750" y2="360"/>
    <line x1="50" y1="440" x2="750" y2="440"/>
  </g>
  <!-- Accent bar -->
  <rect x="50" y="190" width="6" height="120" rx="3" fill="url(#accent)"/>
  <!-- CUSTOMIZE: Title -->
  <text x="80" y="230" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Document Title Here</text>
  <!-- CUSTOMIZE: Subtitle -->
  <text x="80" y="270" font-family="system-ui, sans-serif" font-size="18" font-weight="400" fill="#94a3b8">Subtitle or tagline</text>
  <!-- CUSTOMIZE: Description -->
  <text x="80" y="305" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Brief description line 1</text>
  <text x="80" y="325" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Brief description line 2</text>
  <!-- CUSTOMIZE: Key metrics -->
  <g font-family="system-ui, sans-serif">
    <text x="80" y="420" font-size="24" font-weight="700" fill="#0ea5e9">N</text>
    <text x="110" y="420" font-size="11" fill="#64748b">Metric 1</text>
    <text x="250" y="420" font-size="24" font-weight="700" fill="#0ea5e9">N%</text>
    <text x="300" y="420" font-size="11" fill="#64748b">Metric 2</text>
  </g>
  <!-- CUSTOMIZE: Author -->
  <text x="80" y="500" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Author Name</text>
  <text x="80" y="520" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Document Type  ·  Date  ·  Series Name</text>
  <!-- CUSTOMIZE: Branding -->
  <text x="80" y="560" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">Site Name</text>
</svg>
